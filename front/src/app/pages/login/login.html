<div class="auth-page">
  <div class="auth-card">

    <a class="auth-card__back" routerLink="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </a>

    <div class="auth-card__header">
      <span class="auth-card__brand">Travel&#64;Toulouse</span>
      <h1 class="auth-card__title">Bon retour</h1>
      <p class="auth-card__subtitle">Connectez-vous à votre compte</p>
    </div>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="auth-form__field">
        <label class="auth-form__label" for="email">Adresse email</label>
        <input
          id="email"
          class="auth-form__input"
          [class.auth-form__input--error]="form.controls.email.invalid && form.controls.email.touched"
          type="email"
          formControlName="email"
          placeholder="vous@exemple.fr"
          autocomplete="email"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span class="auth-form__error">Email invalide</span>
        }
      </div>

      <div class="auth-form__field">
        <label class="auth-form__label" for="password">Mot de passe</label>
        <input
          id="password"
          class="auth-form__input"
          [class.auth-form__input--error]="form.controls.password.invalid && form.controls.password.touched"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="auth-form__submit" type="submit" [disabled]="loading()">
        @if (loading()) {
          Connexion…
        } @else {
          Se connecter
        }
      </button>

    </form>

    <p class="auth-card__switch">
      Pas encore de compte ?
      <a routerLink="/inscription">S'inscrire</a>
    </p>

  </div>
</div>
